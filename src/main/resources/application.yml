spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/trip_planner?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:trip}
    password: ${DB_PASSWORD:trippw}

  jpa:
    properties:
      hibernate:
        format_sql: true

ai:
  openai:
    api-key: ${AI_OPENAI_API_KEY:}
    model: ${AI_OPENAI_MODEL:}

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:local-development-jwt-secret-change-before-prod}
    access-token-expiration-minutes: ${AUTH_JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:60}

weather:
  open-meteo:
    base-url: ${WEATHER_OPEN_METEO_BASE_URL:https://api.open-meteo.com}
    connect-timeout: ${WEATHER_OPEN_METEO_CONNECT_TIMEOUT:3s}
    read-timeout: ${WEATHER_OPEN_METEO_READ_TIMEOUT:5s}

---

spring:
  config:
    activate:
      on-profile: local,dev

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

---

spring:
  config:
    activate:
      on-profile: test

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET:test-jwt-secret}

---

spring:
  config:
    activate:
      on-profile: openai

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

---

spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
