services:
  mysql:
    image: mysql:8.4
    container_name: trip-planner-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: trip_planner
      MYSQL_USER: trip
      MYSQL_PASSWORD: trippw
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "trip", "-ptrippw"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    container_name: trip-planner-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-openai}
      DB_URL: jdbc:mysql://mysql:3306/trip_planner?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: trip
      DB_PASSWORD: trippw
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-local-development-jwt-secret-change-before-prod}
      AI_OPENAI_API_KEY: ${AI_OPENAI_API_KEY}
      AI_OPENAI_MODEL: ${AI_OPENAI_MODEL}
      KAKAO_LOCAL_REST_API_KEY: ${KAKAO_LOCAL_REST_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
